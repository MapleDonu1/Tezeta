<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="back-container">
  <a href="index.html" class="back-button">← Back to Teams</a>
</div>

<section class="hero team-hero">
  <div class="team-logo-wrap">
    <img id="team-logo" class="team-page-logo" src="" alt="Team logo">
  </div>
  <h1 id="team-name"></h1>
  <p id="team-role"></p>
  <div id="team-meta" class="team-meta"></div>
  <div id="team-stats" class="team-stats"></div>
</section>

<section class="team-section" id="player-section"></section>

<script>
const params = new URLSearchParams(window.location.search);
const teamId = params.get("team");

const roleColors = {
  Tank: "linear-gradient(135deg, #1e3a8a, #0f172a)",
  DPS: "linear-gradient(135deg, #7f1d1d, #0f172a)",
  Support: "linear-gradient(135deg, #166534, #0f172a)",
  Flex: "linear-gradient(135deg, #111827, #0f172a)"
};

fetch('team.json')
  .then(res => res.json())
  .then(data => {
    const team = data.find(t => t.teampage === teamId);

    if (!team) {
      document.getElementById("team-name").textContent = "Team not found";
      return;
    }

    document.getElementById("team-name").textContent = team.name;
    document.getElementById("team-role").textContent = team.role;
    document.getElementById("team-logo").src = team.photo;
    document.getElementById("team-logo").alt = `${team.name} logo`;

    const primary = team.colors?.primary || "#61dafb";
    const secondary = team.colors?.secondary || "#111";

document.querySelector(".team-hero").style.background = `
  linear-gradient(135deg, ${secondary}, ${primary}33, #0a0a0a 75%)
`;

    document.documentElement.style.setProperty("--team-primary", primary);
    document.documentElement.style.setProperty("--team-secondary", secondary);

    const meta = document.getElementById("team-meta");

    meta.innerHTML = `
      ${team.game ? `<span class="meta-pill">${team.game}</span>` : ""}
      ${team.region ? `<span class="meta-pill">${team.region}</span>` : ""}
      ${team.tier ? `<span class="meta-pill">${team.tier}</span>` : ""}
      ${team.founded ? `<span class="meta-pill">Founded ${team.founded}</span>` : ""}
      ${team.captain ? `<span class="meta-pill">Captain: ${team.captain}</span>` : ""}
      ${team.recruiting ? `<span class="meta-pill recruiting-pill">Recruiting</span>` : ""}
    `;

    const statsBox = document.getElementById("team-stats");

    if (team.stats?.status === "offseason") {
      statsBox.innerHTML = `
        <div class="stat-offseason">
          Off Season<br>
          <span class="offseason-sub">No active matches</span>
        </div>
      `;
    } else if (team.stats) {
      const wins = team.stats.wins ?? 0;
      const losses = team.stats.losses ?? 0;
      const total = wins + losses;
      const winRate = total > 0 ? Math.round((wins / total) * 100) : 0;

      statsBox.innerHTML = `
        ${team.stats.league ? `
          <div class="stat-card">
            <span class="stat-label">League</span>
            <span class="stat-value">${team.stats.league}</span>
          </div>
        ` : ""}
        <div class="stat-card">
          <span class="stat-label">Wins</span>
          <span class="stat-value">${wins}</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Losses</span>
          <span class="stat-value">${losses}</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Win Rate</span>
          <span class="stat-value">${winRate}%</span>
        </div>
        ${team.stats.placement ? `
          <div class="stat-card">
            <span class="stat-label">Placement</span>
            <span class="stat-value">${team.stats.placement}</span>
          </div>
        ` : ""}
      `;
    } else {
      statsBox.innerHTML = "";
    } 

    const playerSection = document.getElementById("player-section");
    playerSection.innerHTML = "";

    team.players.forEach(player => {
      const card = document.createElement("div");
      card.className = "team-card";

      card.style.background = roleColors[player.role] || "#111";

     card.style.cursor = "pointer";
     card.addEventListener("click", () => {
       window.location.href = `player.html?player=${player.id}`;
     });

      const heroImages = (player.heroes || [])
        .slice(0, 3)
        .map(hero => `<img class="hero-icon" src="${hero}" alt="${player.name} hero">`)
        .join("");

      card.innerHTML = `
        <h3>${player.name}</h3>
        <p style="display:flex; align-items:center; justify-content:center; gap:8px;">
          <img src="${player.roleicon}" style="width:20px; height:20px;" alt="${player.role} icon">
          ${player.role}
        </p>
        <div class="hero-icons">
          ${heroImages}
        </div>
      `;

      playerSection.appendChild(card);
    });
  })
  .catch(err => {
    console.error("Error loading team data:", err);
    document.getElementById("team-name").textContent = "Error loading team";
  });
</script>

</body>
</html>
